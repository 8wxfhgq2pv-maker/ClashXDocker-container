# ClashX 配置文件示例
# 将此文件导入 ClashX 或通过 URL 订阅

proxies:
  # Shadowsocks 代理
  - name: "Docker SS"
    type: ss
    server: 127.0.0.1
    port: 8388
    cipher: aes-256-gcm
    password: "change_me_to_strong_password_123456"
    udp: true

  # V2Ray VLESS 代理
  - name: "Docker V2Ray"
    type: vless
    server: 127.0.0.1
    port: 10086
    uuid: "d96fd47d-0bba-4d85-ab97-4bf37c44fb3d"
    tls: false

  # 直接连接（用于对比）
  - name: "DIRECT"
    type: direct

proxy-groups:
  # 代理组 - 自动选择
  - name: "Proxies"
    type: select
    proxies:
      - "Docker SS"
      - "Docker V2Ray"
      - "DIRECT"

  # 分组 - 用于特定规则
  - name: "Streaming"
    type: select
    proxies:
      - "Docker SS"
      - "DIRECT"

  # 分组 - 自动故障转移
  - name: "Auto"
    type: fallback
    proxies:
      - "Docker SS"
      - "Docker V2Ray"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

rules:
  # 本地规则
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  
  # 中国 IP 直连
  - GEOIP,CN,DIRECT
  
  # 其他流量通过代理
  - MATCH,Proxies

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

# 其他配置
port: 7890
socks-port: 7891
allowed-ips: 
  - 127.0.0.1
  - "::1"
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090
external-ui: dashboard
